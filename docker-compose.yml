services:
  mikrotrack-app:
    container_name: mikrotrack-app
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file:
      - .env
    volumes:
      - /data/snapshots:/data/snapshots
    ports:
      - "8000:8000"

  mikrotrack-web:
    container_name: mikrotrack-web
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file:
      - .env
    depends_on:
      - mikrotrack-app
    ports:
      - "8080:8080"
