name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff==0.4.7

      - name: Backend lint
        run: ruff check app

      - name: Frontend lint
        run: ruff check web

      - name: Test lint
        run: ruff check tests

      - name: Formatting check
        run: ruff format --check app web tests

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_diff.py \
            tests/test_snapshot_diff.py \
            tests/test_state_logic.py \
            tests/test_datetime.py \
            tests/test_mac_index.py \
            tests/test_device_flags.py \
            tests/test_api_session_timing.py \
            tests/test_errors.py

  frontend-tests:
    name: frontend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run frontend/UI tests
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_ui_regression.py \
            tests/test_web_timeline.py

  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - backend-tests
      - frontend-tests
    steps:
      - name: Confirm CI baseline
        run: echo "All baseline checks passed."
